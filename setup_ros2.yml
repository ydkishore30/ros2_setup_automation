- name: Setup Raspberry Pi for ROS2 Development
  hosts: raspberrypi
  become: yes

  vars:
    ros_distro: humble
    ros_user: "{{ ansible_user }}"
    ws_path: "/home/{{ ros_user }}/ros2_ws"
    repo_url: "https://github.com/ydkishore30/ros_basics.git"

  tasks:

    # ---------------- SYSTEM UPDATE ----------------
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Upgrade system
      apt:
        upgrade: dist

    # ---------------- PREREQUISITES ----------------
    - name: Install prerequisites
      apt:
        name:
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
        state: present

    # ---------------- ROS2 REPOSITORY ----------------
    - name: Add ROS2 GPG key
      shell: |
        curl -s https://raw.githubusercontent.com/ros/rosdistro/master/ros.asc \
        | gpg --dearmor -o /usr/share/keyrings/ros-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/ros-archive-keyring.gpg

    - name: Add ROS2 repository
      shell: |
        echo "deb [signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] \
        http://packages.ros.org/ros2/ubuntu $(lsb_release -cs) main" \
        > /etc/apt/sources.list.d/ros2.list

    - name: Update apt after adding ROS2 repo
      apt:
        update_cache: yes

    # ---------------- ROS2 INSTALL ----------------
    - name: Install ROS2 base
      apt:
        name: "ros-{{ ros_distro }}-ros-base"
        state: present

    - name: Install ROS2 build tools
      apt:
        name:
          - python3-colcon-common-extensions
          - python3-rosdep
          - python3-pip
        state: present

    # ---------------- ROSDEP ----------------
    - name: Initialize rosdep (first time only)
      shell: |
        if [ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]; then
          rosdep init
        fi
        rosdep update

    # ---------------- WORKSPACE SETUP ----------------
    - name: Create ROS2 workspace
      file:
        path: "{{ ws_path }}/src"
        state: directory
        owner: "{{ ros_user }}"
        group: "{{ ros_user }}"
        mode: "0755"

    - name: Clone ROS repository
      become: yes
      become_user: "{{ ros_user }}"
      git:
        repo: "{{ repo_url }}"
        dest: "{{ ws_path }}/src/ros_basics"
        force: yes

    # ---------------- BUILD WORKSPACE ----------------
    - name: Build ROS2 workspace
      become: yes
      become_user: "{{ ros_user }}"
      shell: |
        source /opt/ros/{{ ros_distro }}/setup.bash
        cd {{ ws_path }}
        colcon build
      args:
        executable: /bin/bash

    # ---------------- ENVIRONMENT SETUP ----------------
    - name: Source ROS2 in bashrc
      lineinfile:
        path: "/home/{{ ros_user }}/.bashrc"
        line: "source /opt/ros/{{ ros_distro }}/setup.bash"
        state: present

    - name: Set ROS domain ID
      lineinfile:
        path: "/home/{{ ros_user }}/.bashrc"
        line: "export ROS_DOMAIN_ID=0"

    - name: Source workspace in bashrc
      lineinfile:
        path: "/home/{{ ros_user }}/.bashrc"
        line: "source {{ ws_path }}/install/setup.bash"
        state: present

    # ---------------- DEMO NODES ----------------
    - name: Install ROS2 demo nodes
      apt:
        name:
          - "ros-{{ ros_distro }}-demo-nodes-cpp"
          - "ros-{{ ros_distro }}-demo-nodes-py"
        state: present
        update_cache: yes

    - name: ROS2 for login shell
      lineinfile:
        path: "/home/{{ ros_user }}/.profile"
        line: "source /opt/ros/{{ ros_distro }}/setup.bash"
        state: present